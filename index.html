<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAZZEL 現場ルールクイズ</title>
  <style>
    :root {
      --bg: #faf7fb;
      --card: #ffffff;
      --text: #2f2433;
      --sub: #7a677f;
      --accent: #b88bc9;
      --accent-strong: #9a69b0;
      --border: #eadff0;
      --correct: #eef8ee;
      --correct-border: #b6d9b8;
      --shadow: 0 10px 30px rgba(90, 52, 104, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      background: linear-gradient(180deg, #fcf9fd 0%, #f7f2fa 100%);
      color: var(--text);
      line-height: 1.7;
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: #f4ebf8;
      color: var(--accent-strong);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.03em;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.3;
    }

    .lead {
      margin: 0;
      color: var(--sub);
      font-size: 15px;
    }

    .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 22px 0 18px;
      flex-wrap: wrap;
    }

    .progress-label {
      font-size: 14px;
      color: var(--sub);
      font-weight: 700;
    }

    .progress {
      width: 100%;
      height: 10px;
      background: #f2eaf6;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--accent), var(--accent-strong));
      transition: width 0.3s ease;
      border-radius: 999px;
    }

    .question-title {
      font-size: 24px;
      line-height: 1.5;
      margin: 0 0 20px;
      white-space: pre-line;
    }

    .options {
      display: grid;
      gap: 12px;
    }

    .option {
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px 18px;
      background: #fff;
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
    }

    .option:hover {
      transform: translateY(-1px);
      border-color: #d8c3e1;
      box-shadow: 0 8px 18px rgba(155, 105, 176, 0.08);
    }

    .option:disabled {
      cursor: default;
      opacity: 1;
    }

    .option.correct {
      background: var(--correct);
      border-color: var(--correct-border);
    }

    .option.selected-wrong {
      background: #fcf0f0;
      border-color: #e3b5b5;
    }

    .answer-box {
      margin-top: 18px;
      padding: 18px;
      border-radius: 20px;
      background: #faf7fb;
      border: 1px solid var(--border);
      display: none;
    }

    .answer-box.show {
      display: block;
    }

    .answer-result {
      font-weight: 800;
      font-size: 18px;
      margin-bottom: 8px;
      color: var(--accent-strong);
    }

    .answer-text {
      font-size: 15px;
      color: var(--text);
      white-space: pre-line;
    }

    .controls {
      display: flex;
      justify-content: flex-end;
      margin-top: 18px;
    }

    .next-btn, .start-btn, .restart-btn {
      appearance: none;
      border: none;
      border-radius: 999px;
      background: var(--accent-strong);
      color: white;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }

    .next-btn:hover, .start-btn:hover, .restart-btn:hover {
      transform: translateY(-1px);
    }

    .next-btn:disabled {
      opacity: 0.45;
      cursor: default;
      transform: none;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .start-actions {
      margin-top: 22px;
    }

    .note {
      margin-top: 16px;
      padding: 14px 16px;
      background: #faf7fb;
      border: 1px solid var(--border);
      border-radius: 18px;
      color: var(--sub);
      font-size: 14px;
    }

    .result-score {
      font-size: 40px;
      font-weight: 900;
      margin: 6px 0 8px;
      color: var(--accent-strong);
    }

    .result-title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .result-body {
      color: var(--text);
      font-size: 16px;
      white-space: pre-line;
    }

    .result-box {
      margin-top: 18px;
      padding: 18px;
      border-radius: 20px;
      background: #faf7fb;
      border: 1px solid var(--border);
    }

    @media (max-width: 640px) {
      .card { padding: 18px; border-radius: 24px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 21px; }
      .option { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <main class="card">
      <section id="start-screen" class="screen active">
        <div class="badge">MAZZEL / BMSG</div>
        <h1>現場ルール<br>ゆるっと3択クイズ</h1>
        <p class="lead">ライブ前に知っておくと安心なことを、ゆるっとチェック。<br>気楽にどうぞ ✨</p>
        <div class="note">気楽に3択でチェックしてみてね。</div>
        <div class="start-actions">
          <button class="start-btn" id="start-btn">クイズをはじめる</button>
        </div>
      </section>

      <section id="quiz-screen" class="screen">
        <div class="meta">
          <div class="progress-label" id="progress-label">1 / 8</div>
          <div class="progress" aria-hidden="true"><div class="bar" id="progress-bar"></div></div>
        </div>

        <h2 class="question-title" id="question-title"></h2>

        <div class="options" id="options"></div>

        <div class="answer-box" id="answer-box">
          <div class="answer-result" id="answer-result"></div>
          <div class="answer-text" id="answer-text"></div>
        </div>

        <div class="controls">
          <button class="next-btn" id="next-btn" disabled>次へ</button>
        </div>
      </section>

      <section id="result-screen" class="screen">
        <div class="badge">RESULT</div>
        <div class="result-score" id="result-score"></div>
        <div class="result-title" id="result-title"></div>
        <div class="result-box">
          <div class="result-body" id="result-body"></div>
        </div>
        <div class="start-actions">
          <button class="restart-btn" id="restart-btn">もう一度やる</button>
        </div>
      </section>
    </main>
  </div>

  <script>
    const quizData = [
      {
        question: "①連番の友達に、「公演前に軽く飲んでからいこうよ！」と誘われた。\nさて、どうしよう…？",
        options: [
          "最高！友達も呼んでMUZE飲みしよう！",
          "ライブ前に飲酒はしません。エスプレッソ濃いめで。",
          "ま、時間あければ軽くぴぴゃるくらいOKかな"
        ],
        correct: 1,
        explanation: "今回のツアーでは、飲酒しての入場はお断りと案内されています。\nしかも、入場できなかった場合でもチケット代の返金はありません。\n「少しなら大丈夫かな」ではなく、飲みは終演後のお楽しみにとっておくのが安心！"
      },
      {
        question: "②遠征で参加する公演。終演後の新幹線を調べてたらけっこうギリギリかも…どうする？",
        options: [
          "なんとか間に合うはず！気合い根性パッションで乗り切る！",
          "アンコール前に抜ける方法を考える",
          "余裕を持って行動できるプランを立てる"
        ],
        correct: 2,
        explanation: "アリーナ公演は、終演後の規制退場で思ったより時間がかかることがあります。\n「終わったらすぐ出られるはず」で考えると、かなり危ないことも。\nだから遠征のときは、\n終演後の混雑も含めて余裕を持てるプランを立てておくのが安心。\nちなみに「アンコール前に抜ければいいか」と考える人もいるけど、BMSGのライブは基本的にアンコールなし。最後にド派手に盛り上がって終わるので、余韻まで含めて楽しんで！"
      },
      {
        question: "③友だちに「MAZZELっぽい概念ネイルを有料でやってあげるよ」と言われた。いちばん安心な考え方はどれ？",
        options: [
          "個人間だし気にせずお願いしちゃう！",
          "ふひ？公式ルールに触れそうだぞ…？",
          "さすがにお金はダメだけど、おごるくらいならいいかな。"
        ],
        correct: 1,
        explanation: "アーティスト名・グループ名・ファンアート要素などを使ったサービスの提供は、有償・無償を問わず権利や公式ルールに触れる可能性があります。\n\n「個人間だから大丈夫」とは限らないので、慎重に！"
      },
      {
        question: "④最寄駅に到着！\n近くのレストランで「MUZE歓迎プラン」みたいなファン向け集客を見かけた。いちばん安心な考え方はどれ？",
        options: [
          "ファン向けでうれしいので積極的に使う",
          "公式ルールに触れる可能性もあるので慎重に考える",
          "厄介おばさんと化して店に注意しにいく"
        ],
        correct: 1,
        explanation: "ファンネームやアーティスト名を使った営利的な集客は、公式ルールに触れる可能性があります。嬉しくてもここは我慢。そしてルールに抵触している店を見つけても、直接注意はNG。粛々と報告、です。"
      },
      {
        question: "⑤ライブ会場で、メンバーに気持ちを届けたい。いちばんいい方法は？",
        options: [
          "プレゼントやファンレターを持っていく",
          "自作グッズで愛をアピール",
          "音楽をめいっぱい楽しむ"
        ],
        correct: 2,
        explanation: "MAZZELツアーでは、ファンレター・プレゼント等の受け取りはお断りとされています。\nまた、自作応援グッズの持ち込みも禁止。\n\n激重感情を届けたいなら、たくさんの歓声と拍手で！"
      },
      {
        question: "⑥会場物販の整理券を取った。呼び出しまでの過ごし方でいちばん安心なのはどれ？",
        options: [
          "朝からずっと会場前で待機します！デュクシ！",
          "呼出番号が近くなったら会場付近に行く",
          "友だちに代わりに並んでもらう"
        ],
        correct: 1,
        explanation: "整理券制の物販では、呼出番号が近くなってから会場付近で待機するよう案内されることがあります。\n早すぎる待機や代理対応ではなく、案内に合わせて動くのが安心です。"
      },
      {
        question: "⑦無事に開演前に着席！\n 開演前にやっておくといいことは？",
        options: [
          "SNSチェック",
          "B with Uを開く",
          "居眠り"
        ],
        correct: 1,
        explanation: "チェックイン対象の公演では、B with Uアプリからカレンダーを開いてチェックインできます。\nチェックインをすると、その公演だけの限定写真がもらえることがあるので、参加した記念にもなるのがうれしいポイント。\nFC会員以外でもチェックインはできるので、無事に着席してひと息ついたタイミングで、\nB with Uを開いてチェックインできるか確認しておくのがおすすめ！"
      },
      {
        question: "⑧ツアー当日、ライトバンドがなくて心配だ…どうしたらいい？",
        options: [
          "メルカリで買う",
          "代行を頼んででも買う",
          "ライトバンドがなくてもOK"
        ],
        correct: 2,
        explanation: "ライトバンドがなくても、ライブはちゃんと楽しめます。\n実際、\n「荷物になるから今日はつけない」\n「まずは公演を見て、楽しかったら買って帰ろう」\nという人も。\n楽しみ方は人それぞれ。\n持っていないとダメかな…と気にしすぎなくて大丈夫です。\nむりにメルカリで探したり、代行を頼んだりしなくてもOK。\nまずはその日の公演を、自分らしく楽しめることがいちばん大事です。"
      }
    ];

    const startScreen = document.getElementById('start-screen');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    const startBtn = document.getElementById('start-btn');
    const restartBtn = document.getElementById('restart-btn');
    const nextBtn = document.getElementById('next-btn');
    const questionTitle = document.getElementById('question-title');
    const optionsEl = document.getElementById('options');
    const answerBox = document.getElementById('answer-box');
    const answerResult = document.getElementById('answer-result');
    const answerText = document.getElementById('answer-text');
    const progressLabel = document.getElementById('progress-label');
    const progressBar = document.getElementById('progress-bar');
    const resultScore = document.getElementById('result-score');
    const resultTitle = document.getElementById('result-title');
    const resultBody = document.getElementById('result-body');

    let currentIndex = 0;
    let score = 0;
    let answered = false;

    function showScreen(name) {
      [startScreen, quizScreen, resultScreen].forEach(el => el.classList.remove('active'));
      name.classList.add('active');
    }

    function updateProgress() {
      progressLabel.textContent = `${currentIndex + 1} / ${quizData.length}`;
      const pct = ((currentIndex) / quizData.length) * 100;
      progressBar.style.width = `${pct}%`;
    }

    function renderQuestion() {
      answered = false;
      nextBtn.disabled = true;
      answerBox.classList.remove('show');
      answerResult.textContent = '';
      answerText.textContent = '';

      const item = quizData[currentIndex];
      questionTitle.textContent = item.question;
      optionsEl.innerHTML = '';
      updateProgress();

      item.options.forEach((option, index) => {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.textContent = option;
        btn.addEventListener('click', () => selectAnswer(index));
        optionsEl.appendChild(btn);
      });
    }

    function selectAnswer(selectedIndex) {
      if (answered) return;
      answered = true;

      const item = quizData[currentIndex];
      const optionButtons = [...document.querySelectorAll('.option')];

      optionButtons.forEach((btn, idx) => {
        btn.disabled = true;
        if (idx === item.correct) btn.classList.add('correct');
        if (idx === selectedIndex && idx !== item.correct) btn.classList.add('selected-wrong');
      });

      if (selectedIndex === item.correct) {
        score += 1;
        answerResult.textContent = '正解！';
      } else {
        answerResult.textContent = '今回はこれ！';
      }

      answerText.textContent = item.explanation;
      answerBox.classList.add('show');
      nextBtn.disabled = false;

      const pct = ((currentIndex + 1) / quizData.length) * 100;
      progressBar.style.width = `${pct}%`;
    }

    function showResults() {
      showScreen(resultScreen);
      resultScore.textContent = `${score} / ${quizData.length}`;

      if (score >= 7) {
        resultTitle.textContent = 'かなり安心して現場へ行けそう！';
        resultBody.textContent = 'ルールも雰囲気もいい感じに押さえられてるタイプ。\nこのまま楽しく当日へ。';
      } else if (score >= 5) {
        resultTitle.textContent = 'いい感じ、あと少しでさらに安心。';
        resultBody.textContent = '大きくは大丈夫そう。\n細かいルールや見落としやすいポイントを見直すと、もっと安心。';
      } else if (score >= 3) {
        resultTitle.textContent = 'ちょっとだけ見直すとかなり変わりそう。';
        resultBody.textContent = '今のうちに知っておけば、当日もっと気持ちよく過ごせるはず。\nもう一回やるとかなり仕上がる！';
      } else {
        resultTitle.textContent = 'ここから仕上げれば大丈夫。';
        resultBody.textContent = 'まずはチケット、物販、ルール、チェックインあたりから押さえるのがおすすめ。\n伸びしろしかない！';
      }
    }

    nextBtn.addEventListener('click', () => {
      currentIndex += 1;
      if (currentIndex < quizData.length) {
        renderQuestion();
      } else {
        showResults();
      }
    });

    startBtn.addEventListener('click', () => {
      currentIndex = 0;
      score = 0;
      showScreen(quizScreen);
      renderQuestion();
    });

    restartBtn.addEventListener('click', () => {
      currentIndex = 0;
      score = 0;
      showScreen(quizScreen);
      renderQuestion();
    });
  </script>
</body>
</html>
